<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>流量配置</title>
<style>
:root {
  --background: 220 33% 98%;
  --foreground: 222 47% 11%;
  --card: 0 0% 100%;
  --card-foreground: 222 47% 11%;
  --primary: 212 100% 56%;
  --primary-foreground: 0 0% 100%;
  --secondary: 220 14% 96%;
  --secondary-foreground: 222 47% 11%;
  --muted: 220 14% 96%;
  --muted-foreground: 220 9% 46%;
  --accent: 220 14% 96%;
  --accent-foreground: 222 47% 11%;
  --border: 220 18% 88%;
  --input: 0 0% 100%;
  --ring: 212 100% 56%;
  --radius: 0.75rem;
}
.dark {
  --background: 222 22% 6%;
  --foreground: 0 0% 96%;
  --card: 222 20% 8%;
  --card-foreground: 0 0% 96%;
  --primary: 212 100% 52%;
  --primary-foreground: 0 0% 100%;
  --secondary: 222 16% 12%;
  --secondary-foreground: 0 0% 96%;
  --muted: 222 16% 12%;
  --muted-foreground: 220 8% 58%;
  --accent: 222 16% 12%;
  --accent-foreground: 0 0% 96%;
  --border: 222 14% 15%;
  --input: 222 16% 12%;
  --ring: 212 100% 52%;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background-color:hsl(var(--background));
  color:hsl(var(--foreground));
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
.bg-soft{
  position:fixed;inset:0;z-index:-1;
  background-color:hsl(220 20% 96%);
}
.dark .bg-soft{background-color:hsl(222 18% 7%)}

.header{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:14px 24px;
  background:hsl(var(--card)/0.7);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid hsl(var(--border)/0.5);
}
.header h2{font-size:15px;font-weight:600}
.header-btns{display:flex;gap:8px;flex-shrink:0}

.btn{
  padding:7px 18px;border:none;border-radius:8px;
  font-size:13px;font-weight:500;cursor:pointer;
  transition:opacity .15s;
}
.btn:active{opacity:.8}
.btn-save{background:hsl(var(--primary));color:hsl(var(--primary-foreground))}
.btn-reset{background:hsl(var(--secondary));color:hsl(var(--secondary-foreground));border:1px solid hsl(var(--border))}

.container{padding:20px 24px 48px}
.msg{
  padding:10px 16px;border-radius:8px;font-size:13px;
  margin-bottom:14px;animation:in .2s ease-out;
}
.msg-ok{background:hsl(142 72% 90%);color:hsl(142 72% 20%)}
.dark .msg-ok{background:hsl(142 50% 16%);color:hsl(142 60% 70%)}
.msg-err{background:hsl(0 72% 92%);color:hsl(0 72% 28%)}
.dark .msg-err{background:hsl(0 50% 18%);color:hsl(0 60% 70%)}
@keyframes in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(450px,1fr));gap:16px}
.node-card{
  background:hsl(var(--card));
  border:1px solid hsl(var(--border));
  border-radius:var(--radius);padding:16px 20px;
  box-shadow:0 1px 2px hsl(var(--primary)/0.03);
}
.node-card-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:14px;padding-bottom:12px;
  border-bottom:1px solid hsl(var(--border)/0.5);
}
.node-avatar{
  width:30px;height:30px;border-radius:7px;
  background:hsl(var(--primary)/0.12);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:hsl(var(--primary));
  flex-shrink:0;
}
.node-name{font-size:14px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.node-uuid{font-size:11px;color:hsl(var(--muted-foreground));font-family:monospace;flex-shrink:0}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
@media(max-width:480px){.form-grid{grid-template-columns:1fr}}

.form-field{display:flex;flex-direction:column;gap:4px;min-width:0}
.form-field label{font-size:11px;color:hsl(var(--muted-foreground));text-transform:uppercase;letter-spacing:.4px}
.form-field input{
  padding:8px 10px;border:1px solid hsl(var(--border));border-radius:6px;
  font-size:13px;background:hsl(var(--input));color:hsl(var(--foreground));
  outline:none;transition:border-color .15s;
  width:100%;
}
.form-field input:focus{border-color:hsl(var(--ring));box-shadow:0 0 0 2px hsl(var(--ring)/0.15)}

.period-row{display:flex;gap:0}
.period-row .period-num{
  flex:1;min-width:40px;
  border-radius:6px 0 0 6px;
  border-right:none;
}
.period-row .period-num:focus{border-right:1px solid hsl(var(--ring))}

.unit-pills{display:flex;flex-shrink:0}
.unit-pill{
  padding:8px 14px;border:1px solid hsl(var(--border));
  background:hsl(var(--card));color:hsl(var(--muted-foreground));
  font-size:13px;cursor:pointer;outline:none;white-space:nowrap;
  transition:background .15s,color .15s;
}
.unit-pill:focus-visible{box-shadow:0 0 0 2px hsl(var(--ring)/0.3);z-index:1}
.unit-pill:last-child{border-radius:0 6px 6px 0}
.unit-pill:not(:first-child){margin-left:-1px}
.unit-pill.active{
  background:hsl(var(--primary));color:hsl(var(--primary-foreground));
  border-color:hsl(var(--primary));z-index:1;
}

.empty{text-align:center;padding:60px 20px;color:hsl(var(--muted-foreground));font-size:14px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid hsl(var(--muted-foreground)/0.25);border-top-color:hsl(var(--primary));border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg-soft"></div>
<header class="header">
  <h2>流量配置</h2>
  <div class="header-btns">
    <button class="btn btn-reset" id="btn-reset">重置</button>
    <button class="btn btn-save" id="btn-save">保存全部</button>
  </div>
</header>
<div class="container">
  <div id="msg"></div>
  <div id="content"><div class="empty"><span class="spin"></span></div></div>
</div>

<script>
(function() {
  var msgEl = document.getElementById('msg')
  var content = document.getElementById('content')
  var btnSave = document.getElementById('btn-save')
  var btnReset = document.getElementById('btn-reset')

  var hash = window.location.hash
  var query = hash.startsWith('#?') ? hash.slice(2) : ''
  var params = new URLSearchParams(query)
  var token = params.get('token')
  var theme = params.get('theme') || 'light'

  document.documentElement.classList.toggle('dark', theme === 'dark')
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'theme-change') {
      document.documentElement.classList.toggle('dark', e.data.theme === 'dark')
    }
  })

  if (!token) {
    content.innerHTML = '<div class="empty">缺少 token</div>'
    return
  }

  var API = location.origin + '/nodeget/rpc'
  var reqId = 0

  function call(method, p) {
    var id = ++reqId
    return fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jsonrpc:'2.0', method:method, params:Object.assign({ token:token }, p), id:id })
    }).then(function(r) { return r.json() }).then(function(d) {
      if (d.error) throw new Error(d.error.message || JSON.stringify(d.error))
      return d.result
    })
  }

  function loadNodes() {
    return call('nodeget-server_list_all_agent_uuid', {}).then(function(r) {
      var uuids = (r && r.uuids) || []
      if (!Array.isArray(uuids) || !uuids.length) return []
      var items = uuids.map(function(u) { return { namespace:u, key:'metadata_name' } })
      return call('kv_get_multi_value', { namespace_key:items }).then(function(rows) {
        var names = {}
        ;(rows||[]).forEach(function(r) { names[r.namespace] = r.value })
        return uuids.map(function(u) { return { uuid:u, name:names[u] || u } })
          .sort(function(a, b) { return a.name.localeCompare(b.name, 'zh') })
      })
    })
  }

  function loadAllTraffic(uuids) {
    var keys = []
    uuids.forEach(function(u) {
      keys.push({ namespace:u, key:'metadata_traffic_limit_gb' })
      keys.push({ namespace:u, key:'metadata_traffic_price_per_gb' })
      keys.push({ namespace:u, key:'metadata_traffic_period' })
      keys.push({ namespace:u, key:'metadata_traffic_start_date' })
    })
    return call('kv_get_multi_value', { namespace_key:keys }).then(function(rows) {
      var data = {}
      ;(rows||[]).forEach(function(r) {
        if (!data[r.namespace]) data[r.namespace] = {}
        if (r.key === 'metadata_traffic_limit_gb') data[r.namespace].limit = r.value || '0'
        else if (r.key === 'metadata_traffic_price_per_gb') data[r.namespace].price = r.value || '0'
        else if (r.key === 'metadata_traffic_period') data[r.namespace].period = r.value || '1m'
        else if (r.key === 'metadata_traffic_start_date') data[r.namespace].start = r.value || ''
      })
      return data
    })
  }

  function showMsg(text, type) {
    msgEl.innerHTML = '<div class="msg msg-' + type + '">' + text + '</div>'
    setTimeout(function() { msgEl.innerHTML = '' }, 3000)
  }

  function esc(str) {
    var d = document.createElement('div')
    d.textContent = str
    return d.innerHTML
  }

  function parsePeriod(p) {
    var m = (p||'').match(/^(\d+)([dmy])$/i)
    return { num:m ? m[1] : '1', unit:(m ? m[2].toLowerCase() : 'm') }
  }

  function render(nodes, trafficData) {
    if (!nodes.length) {
      content.innerHTML = '<div class="empty">没有可用节点</div>'
      return
    }
    var h = '<div class="card-grid">'
    nodes.forEach(function(n) {
      var t = trafficData[n.uuid] || {}
      var period = parsePeriod(t.period || '1m')
      var initial = (n.name||'').trim().charAt(0).toUpperCase() || '?'

      h += '<div class="node-card">' +
        '<div class="node-card-header">' +
          '<div class="node-avatar">' + initial + '</div>' +
          '<span class="node-name" title="' + esc(n.name) + '">' + esc(n.name) + '</span>' +
          '<span class="node-uuid">' + esc(n.uuid.slice(0,8)) + '</span>' +
        '</div>' +
        '<div class="form-grid">' +
          '<div class="form-field">' +
            '<label>流量限额 (GB)</label>' +
            '<input type="number" min="0" step="1" value="' + (t.limit||'0') + '" data-uuid="' + n.uuid + '" data-field="limit">' +
          '</div>' +
          '<div class="form-field">' +
            '<label>超额单价 (¥/$)</label>' +
            '<input type="number" min="0" step="0.01" value="' + (t.price||'0') + '" data-uuid="' + n.uuid + '" data-field="price">' +
          '</div>' +
          '<div class="form-field">' +
            '<label>计费周期 (自然周期)</label>' +
            '<div class="period-row">' +
              '<input type="number" min="1" value="' + period.num + '" class="period-num" data-uuid="' + n.uuid + '" data-field="periodNum">' +
              '<div class="unit-pills" data-uuid="' + n.uuid + '" data-field="periodUnit" data-value="' + period.unit + '">' +
                '<button type="button" class="unit-pill' + (period.unit==='d'?' active':'') + '" data-v="d">天</button>' +
                '<button type="button" class="unit-pill' + (period.unit==='m'?' active':'') + '" data-v="m">月</button>' +
                '<button type="button" class="unit-pill' + (period.unit==='y'?' active':'') + '" data-v="y">年</button>' +
              '</div>' +
            '</div>' +
          '</div>' +
          '<div class="form-field">' +
            '<label>周期起始日期</label>' +
            '<input type="date" value="' + (t.start||'') + '" data-uuid="' + n.uuid + '" data-field="start">' +
          '</div>' +
        '</div>' +
      '</div>'
    })
    h += '</div>'
    content.innerHTML = h
  }

  function collectFormData() {
    var data = {}
    content.querySelectorAll('[data-uuid]').forEach(function(el) {
      var uuid = el.dataset.uuid
      var field = el.dataset.field
      if (!data[uuid]) data[uuid] = { limit:'0', price:'0', periodNum:'1', periodUnit:'m', start:'' }
      data[uuid][field] = field === 'periodUnit' ? (el.dataset.value || 'm') : el.value
    })
    return data
  }

  btnSave.onclick = function() {
    btnSave.disabled = true
    btnSave.textContent = '保存中…'
    var data = collectFormData()
    var uuids = Object.keys(data)
    var done = 0
    var fail = null

    function next(i) {
      if (i >= uuids.length) {
        btnSave.disabled = false
        btnSave.textContent = '保存全部'
        if (fail) showMsg('保存失败: ' + fail, 'err')
        else showMsg('已保存 ' + done + ' 个节点的流量配置', 'ok')
        return
      }
      var uuid = uuids[i]
      var d = data[uuid]
      var period = (d.periodNum || '1') + (d.periodUnit || 'm')
      call('kv_set_value', { namespace:uuid, key:'metadata_traffic_limit_gb', value:d.limit || '0' })
      .then(function() { return call('kv_set_value', { namespace:uuid, key:'metadata_traffic_price_per_gb', value:d.price || '0' }) })
      .then(function() { return call('kv_set_value', { namespace:uuid, key:'metadata_traffic_period', value:period }) })
      .then(function() { return call('kv_set_value', { namespace:uuid, key:'metadata_traffic_start_date', value:d.start || '' }) })
      .then(function() { done++; next(i + 1) })
      .catch(function(e) { fail = e.message || String(e); done++; next(i + 1) })
    }
    next(0)
  }

  btnReset.onclick = function() {
    content.querySelectorAll('[data-uuid]').forEach(function(el) {
      var field = el.dataset.field
      if (field === 'limit' || field === 'price') el.value = '0'
      else if (field === 'periodNum') el.value = '1'
      else if (field === 'periodUnit') {
        el.dataset.value = 'm'
        el.querySelectorAll('.unit-pill').forEach(function(b) { b.classList.toggle('active', b.dataset.v === 'm') })
      }
      else if (field === 'start') el.value = ''
    })
    showMsg('已重置为默认值，点击「保存全部」生效', 'ok')
  }

  content.addEventListener('click', function(e) {
    var btn = e.target.closest('.unit-pill')
    if (!btn) return
    var pills = btn.closest('.unit-pills')
    pills.querySelectorAll('.unit-pill').forEach(function(b) { b.classList.remove('active') })
    btn.classList.add('active')
    pills.dataset.value = btn.dataset.v
  })

  function init() {
    content.innerHTML = '<div class="empty"><span class="spin"></span></div>'
    loadNodes().then(function(nodes) {
      if (!nodes.length) { content.innerHTML = '<div class="empty">没有可用节点</div>'; return }
      return loadAllTraffic(nodes.map(function(n) { return n.uuid })).then(function(td) {
        render(nodes, td)
      })
    }).catch(function(e) {
      content.innerHTML = '<div class="msg msg-err">加载失败: ' + esc(e.message || String(e)) + '</div>'
    })
  }

  init()
})()
</script>
</body>
</html>
