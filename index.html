<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Next-generation server monitoring and management tools" />
    <link rel="icon" type="image/png" href="./logo.png" />
    <title>NodeGet - StatusShow</title>
    <script>
      window.__config_p__ = fetch('config.json', { cache: 'no-cache' })
        .then(function(res) { return res.ok ? res.json() : Promise.reject(res.status) })
        .catch(function(e) { console.debug('config.json prefetch failed:', e) })
      window.__theme_p__ = fetch('nodeget-theme.json', { cache: 'no-cache' })
        .then(function(res) { return res.ok ? res.json() : Promise.reject(res.status) })
        .catch(function(e) { console.debug('nodeget-theme.json prefetch failed:', e) })
    </script>
    <script>
      try {
        var t = localStorage.getItem('nodeget.theme')
        if (t !== 'light') {
          document.documentElement.classList.add('dark')
        }
      } catch (_) {}
    </script>
    <link rel="stylesheet" href="./custom.css" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="./custom.js" defer></script>
  </body>
</html>
